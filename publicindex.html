<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>The Belt Hub CRM – Login</title>
  <link rel="stylesheet" href="css/styles.css" />

  <!-- Login logic -->
  <script type="module" src="js/auth.js"></script>

  <!-- Redirect + service worker -->
  <script type="module" src="js/index.js"></script>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-header">
        <div class="brand-logo"></div>
        <div>
          <div class="login-title">The Belt Hub CRM</div>
          <div class="login-subtitle">Owner & staff access</div>
        </div>
      </div>

      <form id="login-form">
        <div class="form-row">
          <div class="form-field">
            <label for="login-email">Email</label>
            <input id="login-email" type="email" placeholder="owner@thebelthub.com" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-field">
            <label for="login-password">Password</label>
            <input id="login-password" type="password" placeholder="••••••••" />
          </div>
        </div>

        <div id="login-error" class="error-text" style="margin-top: 6px; color: #d33;"></div>

        <div class="form-row" style="justify-content: flex-end;">
          <button type="submit" class="btn">Sign in</button>
        </div>
      </form>

    </div>
  </div>
</body>
</html>
