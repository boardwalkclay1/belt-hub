<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>The Belt Hub CRM – Rentals</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo"></div>
        <div class="brand-text">
          <div class="brand-name">The Belt Hub</div>
          <div class="brand-sub">Ride CRM</div>
        </div>
      </div>

      <div>
        <div class="nav-section-title">Main</div>
        <nav class="nav">
          <a href="dashboard.html"><span class="icon">🏠</span>Dashboard</a>
          <a href="customers.html"><span class="icon">👤</span>Customers</a>
          <a href="rentals.html" class="active"><span class="icon">🚲</span>Rentals</a>
          <a href="payments.html"><span class="icon">💳</span>Payments</a>
        </nav>
      </div>

      <div>
        <div class="nav-section-title">Content</div>
        <nav class="nav">
          <a href="waivers.html"><span class="icon">📜</span>Waivers</a>
          <a href="coupons.html"><span class="icon">🏷️</span>Coupons</a>
          <a href="messaging.html"><span class="icon">✉️</span>Messaging</a>
          <a href="settings.html"><span class="icon">⚙️</span>Settings</a>
        </nav>
      </div>
    </aside>

    <main class="main">
      <div class="main-header">
        <div>
          <div class="main-title">Rentals</div>
          <div class="main-subtitle">Track every ride, deposit, and status</div>
        </div>
      </div>

      <section class="section table-card">
        <div class="section-header">
          <div class="section-title">All rentals</div>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Customer</th>
                <th>Bike</th>
                <th>Start</th>
                <th>End</th>
                <th>Final amount</th>
                <th>Deposit</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="rentals-table-body">
              <!-- JS will populate -->
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <!-- ⭐ REQUIRED: wire the page to the JS logic -->
  <script type="module" src="js/rentals.js"></script>
</body>
</html>
