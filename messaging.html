<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>The Belt Hub CRM – Messaging</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <!-- sidebar unchanged -->

    <main class="main">
      <div class="main-header">
        <div>
          <div class="main-title">Messaging</div>
          <div class="main-subtitle">Email and SMS campaigns to past riders</div>
        </div>
        <div class="main-actions">
          <button class="btn">Send campaign</button>
        </div>
      </div>

      <!-- audience + message sections unchanged -->

      <section class="section table-card">
        <div class="section-header">
          <div class="section-title">Recent messages</div>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Type</th>
                <th>Channel</th>
                <th>Audience</th>
                <th>Sent</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="messages-table-body">
              <!-- JS will populate -->
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <!-- ⭐ REQUIRED: wire the page to the JS logic -->
  <script type="module" src="js/messaging.js"></script>
</body>
</html>
